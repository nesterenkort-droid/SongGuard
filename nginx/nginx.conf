# Reverse proxy in front of the FastAPI web service.
# TLS (certbot) is wired up in M7 once a domain exists; for now this serves plain HTTP.
server {
    listen 80;
    server_name _;

    # Headroom for future audio-file uploads (original WAV/MP3).
    client_max_body_size 60m;

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
